<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✋ Air Canvas — Draw in Air with AI</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<style>
  :root {
    --bg: #030712;
    --panel: #0a0f1e;
    --border: #0d2040;
    --border-bright: #0e3a6e;
    --cyan: #00e5ff;
    --cyan-dim: #007a8a;
    --purple: #7c3aed;
    --green: #00ff9d;
    --red: #ff2d6b;
    --text: #a8d4e6;
    --text-dim: #2a4a6a;
    --mono: 'Share Tech Mono', monospace;
    --display: 'Rajdhani', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--display); }

  /* Scanline + grid background */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(0,229,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  #app { position: relative; z-index: 1; display: flex; flex-direction: column; height: 100vh; }

  /* ── HEADER ── */
  header {
    display: flex; align-items: center; gap: 16px;
    padding: 8px 20px;
    background: linear-gradient(90deg, #030d1a, #050e1f);
    border-bottom: 1px solid var(--border-bright);
    box-shadow: 0 0 20px rgba(0,229,255,0.08);
    position: relative; z-index: 10;
    flex-shrink: 0;
  }
  .logo {
    font-family: var(--mono); font-size: 1.15rem; letter-spacing: 2px;
    color: var(--cyan); text-shadow: 0 0 12px var(--cyan);
    display: flex; align-items: center; gap: 8px;
  }
  .logo-dot { width: 8px; height: 8px; background: var(--cyan); border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 6px var(--cyan)} 50%{opacity:0.4;box-shadow:none} }

  .header-tips {
    margin-left: auto; display: flex; gap: 20px; font-family: var(--mono); font-size: 0.7rem; color: var(--text-dim);
  }
  .tip { display: flex; align-items: center; gap: 6px; }
  .tip-key { color: var(--cyan); text-shadow: 0 0 8px var(--cyan); }

  /* ── MAIN LAYOUT ── */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* ── CANVAS AREA ── */
  .canvas-wrap {
    position: relative; flex: 1; overflow: hidden; background: #010508;
  }
  #webcam {
    position: absolute; inset: 0;
    width: 100%; height: 100%; object-fit: cover;
    transform: scaleX(-1); opacity: 0.18;
  }
  #drawCanvas {
    position: absolute; inset: 0; width: 100%; height: 100%;
    touch-action: none; cursor: none;
  }
  #overlayCanvas {
    position: absolute; inset: 0; width: 100%; height: 100%;
    pointer-events: none;
  }

  /* Mode badge */
  .mode-badge {
    position: absolute; top: 16px; left: 16px;
    font-family: var(--mono); font-size: 0.8rem; letter-spacing: 1px;
    padding: 6px 16px; border-radius: 2px;
    border: 1px solid; transition: all 0.2s;
  }
  .mode-draw   { color: var(--cyan); border-color: var(--cyan); background: rgba(0,229,255,0.07); text-shadow: 0 0 8px var(--cyan); box-shadow: 0 0 12px rgba(0,229,255,0.12); }
  .mode-erase  { color: var(--red);  border-color: var(--red);  background: rgba(255,45,107,0.07); text-shadow: 0 0 8px var(--red); }
  .mode-none   { color: var(--text-dim); border-color: var(--border); background: rgba(0,0,0,0.3); }

  /* Status bar */
  .status-bar {
    position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
    font-family: var(--mono); font-size: 0.7rem; color: var(--text-dim);
    padding: 5px 16px; border: 1px solid var(--border); background: rgba(3,7,18,0.85);
    border-radius: 2px; white-space: nowrap; backdrop-filter: blur(4px);
  }

  /* Corner decorators */
  .corner { position: absolute; width: 20px; height: 20px; border-color: var(--cyan-dim); }
  .corner-tl { top:8px; left:8px; border-top:1px solid; border-left:1px solid; }
  .corner-tr { top:8px; right:8px; border-top:1px solid; border-right:1px solid; }
  .corner-bl { bottom:8px; left:8px; border-bottom:1px solid; border-left:1px solid; }
  .corner-br { bottom:8px; right:8px; border-bottom:1px solid; border-right:1px solid; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 260px; flex-shrink: 0;
    background: var(--panel);
    border-left: 1px solid var(--border-bright);
    display: flex; flex-direction: column;
    overflow-y: auto; overflow-x: hidden;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); }

  .section {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }
  .section-title {
    font-family: var(--mono); font-size: 0.65rem; letter-spacing: 2px;
    color: var(--cyan-dim); text-transform: uppercase;
    margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
  }
  .section-title::after {
    content:''; flex:1; height:1px; background: linear-gradient(90deg, var(--border-bright), transparent);
  }

  /* Gesture indicators */
  .gesture-row {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 10px; margin-bottom: 4px;
    border: 1px solid var(--border); border-radius: 2px;
    font-size: 0.85rem; font-family: var(--display); font-weight: 600;
    transition: all 0.15s;
  }
  .gesture-row.active-draw  { border-color: var(--cyan); background: rgba(0,229,255,0.06); color: var(--cyan); }
  .gesture-row.active-erase { border-color: var(--red); background: rgba(255,45,107,0.06); color: var(--red); }
  .gesture-row.active-none  { border-color: var(--green); background: rgba(0,255,157,0.06); color: var(--green); }
  .gesture-icon { font-size: 1.1rem; }
  .gesture-led { width: 6px; height: 6px; border-radius: 50%; background: var(--border); margin-left: auto; transition: all 0.2s; }
  .gesture-led.on-draw  { background: var(--cyan); box-shadow: 0 0 6px var(--cyan); }
  .gesture-led.on-erase { background: var(--red); box-shadow: 0 0 6px var(--red); }
  .gesture-led.on-none  { background: var(--green); box-shadow: 0 0 6px var(--green); }

  /* Color palette */
  .color-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; }
  .color-swatch {
    width: 100%; aspect-ratio: 1;
    border-radius: 2px; cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.15s; position: relative;
  }
  .color-swatch:hover { transform: scale(1.12); }
  .color-swatch.active { border-color: white; box-shadow: 0 0 8px rgba(255,255,255,0.5); transform: scale(1.08); }

  /* Custom color */
  .custom-color-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  input[type="color"] {
    width: 36px; height: 28px; padding: 0; border: 1px solid var(--border-bright);
    background: none; cursor: pointer; border-radius: 2px;
  }
  .color-hex {
    font-family: var(--mono); font-size: 0.75rem; color: var(--text-dim);
    flex: 1;
  }

  /* Sliders */
  .slider-row { margin-bottom: 10px; }
  .slider-label-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.78rem; }
  .slider-name { color: var(--text-dim); font-family: var(--mono); font-size: 0.65rem; letter-spacing: 1px; text-transform: uppercase; }
  .slider-val { font-family: var(--mono); font-size: 0.75rem; color: var(--cyan); }
  input[type="range"] {
    -webkit-appearance: none; width: 100%; height: 2px;
    background: var(--border-bright); border-radius: 1px; outline: none; cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px;
    background: var(--cyan); border-radius: 50%;
    box-shadow: 0 0 8px var(--cyan); cursor: pointer;
  }

  /* Buttons */
  .btn {
    width: 100%; padding: 10px; border: 1px solid; border-radius: 2px;
    font-family: var(--mono); font-size: 0.75rem; letter-spacing: 1px;
    text-transform: uppercase; cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn + .btn { margin-top: 8px; }
  .btn-primary {
    background: rgba(124,58,237,0.15); color: #a78bfa;
    border-color: var(--purple);
  }
  .btn-primary:hover:not(:disabled) { background: rgba(124,58,237,0.3); box-shadow: 0 0 16px rgba(124,58,237,0.3); }
  .btn-cyan {
    background: rgba(0,229,255,0.08); color: var(--cyan);
    border-color: var(--cyan-dim);
  }
  .btn-cyan:hover:not(:disabled) { background: rgba(0,229,255,0.15); box-shadow: 0 0 14px rgba(0,229,255,0.2); }
  .btn-danger {
    background: rgba(255,45,107,0.07); color: var(--red);
    border-color: #4a0d1f;
  }
  .btn-danger:hover:not(:disabled) { background: rgba(255,45,107,0.15); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* Result */
  .result-box {
    min-height: 180px; background: rgba(0,0,0,0.4);
    border: 1px solid var(--border); border-radius: 2px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; position: relative;
  }
  .result-box img { width: 100%; display: block; border-radius: 2px; }
  .result-placeholder { text-align: center; color: var(--text-dim); font-family: var(--mono); font-size: 0.7rem; line-height: 1.8; padding: 20px; }
  .result-placeholder span { display: block; font-size: 1.8rem; margin-bottom: 8px; opacity: 0.4; }

  .prompt-display {
    margin-top: 8px; font-family: var(--mono); font-size: 0.65rem;
    color: var(--purple); line-height: 1.5; min-height: 20px;
    word-break: break-word;
  }

  /* Spinner */
  .spinner-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--cyan);
    border-radius: 50%; animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner-label { font-family: var(--mono); font-size: 0.65rem; color: var(--text-dim); }

  /* Download btn (small) */
  .dl-btn {
    position: absolute; top: 6px; right: 6px;
    font-family: var(--mono); font-size: 0.6rem; letter-spacing: 1px;
    color: var(--cyan); background: rgba(0,0,0,0.7); border: 1px solid var(--border-bright);
    padding: 3px 8px; cursor: pointer; border-radius: 2px; text-decoration: none;
  }
  .dl-btn:hover { background: rgba(0,229,255,0.1); }
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-dot"></div>
      AIR CANVAS
    </div>
    <div class="header-tips">
      <div class="tip"><span class="tip-key">☝</span> INDEX UP = DRAW</div>
      <div class="tip"><span class="tip-key">✌</span> PEACE = ERASE</div>
      <div class="tip"><span class="tip-key">✊</span> FIST = LIFT PEN</div>
    </div>
  </header>

  <!-- MAIN -->
  <div class="main">

    <!-- CANVAS AREA -->
    <div class="canvas-wrap" id="canvasWrap">
      <video id="webcam" autoplay muted playsinline></video>
      <canvas id="drawCanvas"></canvas>
      <canvas id="overlayCanvas"></canvas>

      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>

      <div class="mode-badge mode-none" id="modeBadge">[ NO HAND DETECTED ]</div>
      <div class="status-bar" id="statusBar">INITIALIZING HAND TRACKING...</div>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar">

      <!-- GESTURE STATUS -->
      <div class="section">
        <div class="section-title">GESTURE STATUS</div>
        <div class="gesture-row" id="row-draw">
          <span class="gesture-icon">☝</span>
          <span>Index Up — DRAW</span>
          <div class="gesture-led" id="led-draw"></div>
        </div>
        <div class="gesture-row" id="row-erase">
          <span class="gesture-icon">✌</span>
          <span>Peace Sign — ERASE</span>
          <div class="gesture-led" id="led-erase"></div>
        </div>
        <div class="gesture-row" id="row-none">
          <span class="gesture-icon">✊</span>
          <span>Fist / Other — LIFT</span>
          <div class="gesture-led" id="led-none"></div>
        </div>
      </div>

      <!-- COLORS -->
      <div class="section">
        <div class="section-title">COLOR</div>
        <div class="color-grid" id="colorGrid"></div>
        <div class="custom-color-row">
          <input type="color" id="customColor" value="#00e5ff" title="Custom color">
          <span class="color-hex" id="hexDisplay">#00e5ff</span>
        </div>
      </div>

      <!-- BRUSH -->
      <div class="section">
        <div class="section-title">BRUSH</div>
        <div class="slider-row">
          <div class="slider-label-row">
            <span class="slider-name">SIZE</span>
            <span class="slider-val" id="sizeVal">8</span>
          </div>
          <input type="range" id="brushSize" min="2" max="40" value="8">
        </div>
        <div class="slider-row">
          <div class="slider-label-row">
            <span class="slider-name">OPACITY</span>
            <span class="slider-val" id="opacityVal">100%</span>
          </div>
          <input type="range" id="brushOpacity" min="10" max="100" value="100">
        </div>
        <div class="slider-row">
          <div class="slider-label-row">
            <span class="slider-name">SMOOTHING</span>
            <span class="slider-val" id="smoothVal">5</span>
          </div>
          <input type="range" id="smoothing" min="1" max="10" value="5">
        </div>
      </div>

      <!-- ACTIONS -->
      <div class="section">
        <div class="section-title">ACTIONS</div>
        <button class="btn btn-danger" onclick="clearCanvas()">🗑 CLEAR CANVAS</button>
        <button class="btn btn-cyan" onclick="saveCanvas()">💾 SAVE DRAWING</button>
        <button class="btn btn-primary" id="convertBtn" onclick="convertToImage()">
          ✦ CONVERT TO REAL IMAGE
        </button>
      </div>

      <!-- AI RESULT -->
      <div class="section" style="flex:1">
        <div class="section-title">AI RESULT</div>
        <div class="result-box" id="resultBox">
          <div class="result-placeholder">
            <span>🎨</span>
            DRAW SOMETHING<br>THEN CLICK CONVERT
          </div>
        </div>
        <div class="prompt-display" id="promptDisplay"></div>
      </div>

    </div><!-- /sidebar -->
  </div><!-- /main -->
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  PALETTE
// ═══════════════════════════════════════════════════════════
const PALETTE = [
  '#ffffff','#ff2d6b','#ff6b00','#ffd600',
  '#00ff9d','#00e5ff','#aa44ff','#ff44aa',
  '#aaffee','#ffccaa','#ffff88','#88ffcc',
  '#88ddff','#ddaaff','#ffaadd','#778899',
  '#ff4400','#0088ff','#00cc44','#cc0066',
  '#4400cc','#00aacc','#cc8800','#223366',
];

let currentColor = '#00e5ff';
let brushSize = 8;
let brushOpacity = 1.0;
let smoothingFactor = 5;
let lastX = null, lastY = null;
let currentMode = 'init';
let smoothX = null, smoothY = null;

// ═══════════════════════════════════════════════════════════
//  CANVAS SETUP
// ═══════════════════════════════════════════════════════════
const drawCanvas = document.getElementById('drawCanvas');
const overlayCanvas = document.getElementById('overlayCanvas');
const dCtx = drawCanvas.getContext('2d');
const oCtx = overlayCanvas.getContext('2d');

function resizeCanvases() {
  const wrap = document.getElementById('canvasWrap');
  const w = wrap.clientWidth;
  const h = wrap.clientHeight;

  // Preserve drawing
  const tmp = document.createElement('canvas');
  tmp.width = drawCanvas.width;
  tmp.height = drawCanvas.height;
  tmp.getContext('2d').drawImage(drawCanvas, 0, 0);

  drawCanvas.width = w; drawCanvas.height = h;
  overlayCanvas.width = w; overlayCanvas.height = h;

  dCtx.drawImage(tmp, 0, 0);
}
window.addEventListener('resize', resizeCanvases);

// ═══════════════════════════════════════════════════════════
//  COLOR SWATCHES
// ═══════════════════════════════════════════════════════════
const grid = document.getElementById('colorGrid');
PALETTE.forEach(c => {
  const s = document.createElement('div');
  s.className = 'color-swatch' + (c === currentColor ? ' active' : '');
  s.style.background = c;
  s.title = c;
  s.onclick = () => selectColor(c);
  grid.appendChild(s);
});

function selectColor(c) {
  currentColor = c;
  document.querySelectorAll('.color-swatch').forEach(el => el.classList.remove('active'));
  // find matching swatch
  [...document.querySelectorAll('.color-swatch')].forEach(el => {
    if (el.style.background === hexToRgbStr(c) || el.style.background === c) el.classList.add('active');
  });
  document.getElementById('hexDisplay').textContent = c;
  document.getElementById('customColor').value = c;
}

// Custom color picker
const customColorPicker = document.getElementById('customColor');
customColorPicker.addEventListener('input', e => {
  currentColor = e.target.value;
  document.getElementById('hexDisplay').textContent = e.target.value;
  document.querySelectorAll('.color-swatch').forEach(el => el.classList.remove('active'));
});

function hexToRgbStr(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgb(${r}, ${g}, ${b})`;
}

// Sliders
document.getElementById('brushSize').addEventListener('input', e => {
  brushSize = +e.target.value;
  document.getElementById('sizeVal').textContent = brushSize;
});
document.getElementById('brushOpacity').addEventListener('input', e => {
  brushOpacity = e.target.value / 100;
  document.getElementById('opacityVal').textContent = e.target.value + '%';
});
document.getElementById('smoothing').addEventListener('input', e => {
  smoothingFactor = +e.target.value;
  document.getElementById('smoothVal').textContent = e.target.value;
});

// ═══════════════════════════════════════════════════════════
//  DRAWING ENGINE
// ═══════════════════════════════════════════════════════════
function drawAt(x, y, mode) {
  // Smoothing (lerp)
  const alpha = 1 - (smoothingFactor - 1) * 0.08;
  smoothX = smoothX === null ? x : smoothX + (x - smoothX) * alpha;
  smoothY = smoothY === null ? y : smoothY + (y - smoothY) * alpha;

  if (mode === 'draw') {
    dCtx.globalCompositeOperation = 'source-over';
    dCtx.globalAlpha = brushOpacity;
    dCtx.strokeStyle = currentColor;
    dCtx.lineWidth = brushSize;
    dCtx.lineCap = 'round';
    dCtx.lineJoin = 'round';

    if (lastX !== null) {
      dCtx.beginPath();
      dCtx.moveTo(lastX, lastY);
      dCtx.lineTo(smoothX, smoothY);
      dCtx.stroke();
    }
    lastX = smoothX;
    lastY = smoothY;

  } else if (mode === 'erase') {
    dCtx.globalCompositeOperation = 'destination-out';
    dCtx.globalAlpha = 1;
    dCtx.beginPath();
    dCtx.arc(smoothX, smoothY, brushSize * 2.5, 0, Math.PI * 2);
    dCtx.fill();
    lastX = smoothX;
    lastY = smoothY;

  } else {
    lastX = null; lastY = null; smoothX = null; smoothY = null;
  }
}

function clearCanvas() {
  dCtx.globalCompositeOperation = 'source-over';
  dCtx.globalAlpha = 1;
  dCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  lastX = null; lastY = null; smoothX = null; smoothY = null;
}

function saveCanvas() {
  // Composite: dark background + drawing
  const tmp = document.createElement('canvas');
  tmp.width = drawCanvas.width; tmp.height = drawCanvas.height;
  const t = tmp.getContext('2d');
  t.fillStyle = '#030712';
  t.fillRect(0, 0, tmp.width, tmp.height);
  t.drawImage(drawCanvas, 0, 0);

  const link = document.createElement('a');
  link.download = 'air-drawing.png';
  link.href = tmp.toDataURL('image/png');
  link.click();
}

// ═══════════════════════════════════════════════════════════
//  GESTURE DETECTION
// ═══════════════════════════════════════════════════════════
function isUp(lm, tip, pip) {
  return lm[tip].y < lm[pip].y;
}

function detectGesture(lm) {
  const iIdx  = isUp(lm, 8,  6);
  const iMid  = isUp(lm, 12, 10);
  const iRing = isUp(lm, 16, 14);
  const iPink = isUp(lm, 20, 18);

  if (iIdx && iMid && !iRing && !iPink) return 'erase';  // ✌️
  if (iIdx && !iMid && !iRing && !iPink) return 'draw';  // ☝️
  return 'none';
}

// ═══════════════════════════════════════════════════════════
//  OVERLAY DRAWING (hand skeleton + cursor)
// ═══════════════════════════════════════════════════════════
const CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [0,9],[9,10],[10,11],[11,12],
  [0,13],[13,14],[14,15],[15,16],
  [0,17],[17,18],[18,19],[19,20],
  [5,9],[9,13],[13,17]
];

function drawOverlay(lm, W, H, gesture) {
  oCtx.clearRect(0, 0, W, H);

  const skelColor = gesture === 'draw' ? '#00e5ff' : gesture === 'erase' ? '#ff2d6b' : '#223355';
  const skelAlpha = gesture === 'none' ? 0.25 : 0.5;

  oCtx.strokeStyle = skelColor;
  oCtx.globalAlpha = skelAlpha;
  oCtx.lineWidth = 1.2;

  CONNECTIONS.forEach(([a, b]) => {
    const la = lm[a], lb = lm[b];
    oCtx.beginPath();
    oCtx.moveTo((1 - la.x) * W, la.y * H);
    oCtx.lineTo((1 - lb.x) * W, lb.y * H);
    oCtx.stroke();
  });

  // Joints
  [4, 8, 12, 16, 20].forEach(i => {
    oCtx.globalAlpha = 0.6;
    oCtx.beginPath();
    oCtx.arc((1 - lm[i].x) * W, lm[i].y * H, 3, 0, Math.PI * 2);
    oCtx.fillStyle = skelColor;
    oCtx.fill();
  });

  // Cursor at index tip
  const cx = (1 - lm[8].x) * W;
  const cy = lm[8].y * H;

  oCtx.globalAlpha = 1;
  if (gesture === 'draw') {
    // Brush preview
    oCtx.beginPath();
    oCtx.arc(cx, cy, brushSize / 2, 0, Math.PI * 2);
    oCtx.fillStyle = currentColor;
    oCtx.fill();
    oCtx.strokeStyle = 'rgba(255,255,255,0.6)';
    oCtx.lineWidth = 1;
    oCtx.stroke();

    // Outer ring pulse
    oCtx.globalAlpha = 0.3;
    oCtx.beginPath();
    oCtx.arc(cx, cy, brushSize, 0, Math.PI * 2);
    oCtx.strokeStyle = currentColor;
    oCtx.stroke();

  } else if (gesture === 'erase') {
    oCtx.beginPath();
    oCtx.arc(cx, cy, brushSize * 2.5, 0, Math.PI * 2);
    oCtx.strokeStyle = '#ff2d6b';
    oCtx.lineWidth = 1.5;
    oCtx.stroke();

    // X mark
    const r = 8;
    oCtx.strokeStyle = '#ff2d6b';
    oCtx.lineWidth = 1.5;
    oCtx.beginPath(); oCtx.moveTo(cx-r,cy-r); oCtx.lineTo(cx+r,cy+r); oCtx.stroke();
    oCtx.beginPath(); oCtx.moveTo(cx+r,cy-r); oCtx.lineTo(cx-r,cy+r); oCtx.stroke();

  } else {
    // Crosshair
    oCtx.globalAlpha = 0.3;
    oCtx.strokeStyle = '#445566';
    oCtx.lineWidth = 1;
    const cr = 12;
    oCtx.beginPath(); oCtx.moveTo(cx-cr,cy); oCtx.lineTo(cx+cr,cy); oCtx.stroke();
    oCtx.beginPath(); oCtx.moveTo(cx,cy-cr); oCtx.lineTo(cx,cy+cr); oCtx.stroke();
  }

  oCtx.globalAlpha = 1;
}

// ═══════════════════════════════════════════════════════════
//  UI STATE
// ═══════════════════════════════════════════════════════════
function setMode(mode) {
  if (mode === currentMode) return;
  currentMode = mode;

  const badge = document.getElementById('modeBadge');
  // Rows
  ['draw','erase','none'].forEach(m => {
    document.getElementById('row-'+m).className = 'gesture-row';
    document.getElementById('led-'+m).className = 'gesture-led';
  });

  if (mode === 'draw') {
    badge.textContent = '[ ✏ DRAWING ]';
    badge.className = 'mode-badge mode-draw';
    document.getElementById('row-draw').className = 'gesture-row active-draw';
    document.getElementById('led-draw').className = 'gesture-led on-draw';
  } else if (mode === 'erase') {
    badge.textContent = '[ ✗ ERASING ]';
    badge.className = 'mode-badge mode-erase';
    document.getElementById('row-erase').className = 'gesture-row active-erase';
    document.getElementById('led-erase').className = 'gesture-led on-erase';
  } else if (mode === 'none') {
    badge.textContent = '[ PEN LIFTED ]';
    badge.className = 'mode-badge mode-none';
    document.getElementById('row-none').className = 'gesture-row active-none';
    document.getElementById('led-none').className = 'gesture-led on-none';
  } else {
    badge.textContent = '[ NO HAND DETECTED ]';
    badge.className = 'mode-badge mode-none';
  }
}

// ═══════════════════════════════════════════════════════════
//  MEDIAPIPE HANDS
// ═══════════════════════════════════════════════════════════
const hands = new Hands({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});

hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 1,
  minDetectionConfidence: 0.75,
  minTrackingConfidence: 0.6,
});

hands.onResults(results => {
  const W = overlayCanvas.width;
  const H = overlayCanvas.height;

  if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
    oCtx.clearRect(0, 0, W, H);
    setMode('nohand');
    lastX = null; lastY = null; smoothX = null; smoothY = null;
    return;
  }

  const lm = results.multiHandLandmarks[0];
  const gesture = detectGesture(lm);
  setMode(gesture);
  drawOverlay(lm, W, H, gesture);

  const x = (1 - lm[8].x) * W;
  const y = lm[8].y * H;

  if (gesture !== 'none') drawAt(x, y, gesture);
  else { lastX = null; lastY = null; smoothX = null; smoothY = null; }
});

// ═══════════════════════════════════════════════════════════
//  CAMERA
// ═══════════════════════════════════════════════════════════
async function startCamera() {
  const statusBar = document.getElementById('statusBar');
  try {
    statusBar.textContent = 'REQUESTING CAMERA ACCESS...';
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: 1280, height: 720, facingMode: 'user' }
    });
    const video = document.getElementById('webcam');
    video.srcObject = stream;

    resizeCanvases();

    const camera = new Camera(video, {
      onFrame: async () => { await hands.send({ image: video }); },
      width: 1280, height: 720,
    });
    camera.start();
    statusBar.textContent = 'CAMERA ACTIVE — SHOW YOUR HAND TO START';
  } catch (err) {
    document.getElementById('statusBar').textContent = 'CAMERA ERROR: ' + err.message;
    document.getElementById('modeBadge').textContent = '[ CAMERA UNAVAILABLE ]';
  }
}

startCamera();

// ═══════════════════════════════════════════════════════════
//  AI CONVERSION
// ═══════════════════════════════════════════════════════════
async function convertToImage() {
  const btn = document.getElementById('convertBtn');
  const resultBox = document.getElementById('resultBox');
  const promptDisplay = document.getElementById('promptDisplay');

  btn.disabled = true;
  btn.textContent = '⏳ ANALYZING SKETCH...';
  promptDisplay.textContent = '';

  resultBox.innerHTML = `
    <div class="spinner-wrap">
      <div class="spinner"></div>
      <div class="spinner-label">ANALYZING YOUR SKETCH WITH AI...</div>
    </div>`;

  try {
    // Build a flat white-on-black version for better AI recognition
    const tmp = document.createElement('canvas');
    tmp.width = drawCanvas.width; tmp.height = drawCanvas.height;
    const t = tmp.getContext('2d');
    t.fillStyle = '#000000';
    t.fillRect(0, 0, tmp.width, tmp.height);
    t.drawImage(drawCanvas, 0, 0);
    const base64 = tmp.toDataURL('image/png').split(',')[1];

    // 1. Claude interprets the sketch
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'anthropic-version': '2023-06-01' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 120,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: 'image/png', data: base64 } },
            { type: 'text', text: 'This is a rough air-drawn sketch made with a finger. Look carefully at the shapes and lines. Generate a vivid, specific image generation prompt (15–25 words) describing what this sketch depicts — focus on the subject, style (photorealistic or illustrated), lighting, and detail. Reply with ONLY the prompt text, nothing else.' }
          ]
        }]
      })
    });

    const data = await resp.json();
    if (data.error) throw new Error(data.error.message);

    const prompt = data.content[0].text.trim();
    promptDisplay.textContent = '▸ ' + prompt;

    btn.textContent = '🖼 GENERATING IMAGE...';
    resultBox.innerHTML = `
      <div class="spinner-wrap">
        <div class="spinner"></div>
        <div class="spinner-label">GENERATING IMAGE WITH AI...</div>
      </div>`;

    // 2. Pollinations generates the image (free, no key needed)
    const seed = Math.floor(Math.random() * 99999);
    const imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + ', high quality, detailed')}?width=512&height=512&seed=${seed}&nologo=true&enhance=true`;

    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      resultBox.innerHTML = '';
      resultBox.appendChild(img);

      // Download link
      const dl = document.createElement('a');
      dl.className = 'dl-btn';
      dl.textContent = '↓ SAVE';
      dl.href = imageUrl;
      dl.download = 'ai-result.png';
      dl.target = '_blank';
      resultBox.appendChild(dl);

      btn.disabled = false;
      btn.textContent = '✦ CONVERT TO REAL IMAGE';
    };
    img.onerror = () => {
      resultBox.innerHTML = '<div class="result-placeholder"><span>⚠</span>IMAGE GENERATION FAILED<br>TRY AGAIN</div>';
      btn.disabled = false;
      btn.textContent = '✦ CONVERT TO REAL IMAGE';
    };
    img.src = imageUrl;

  } catch (err) {
    console.error(err);
    resultBox.innerHTML = `<div class="result-placeholder"><span>⚠</span>ERROR<br>${err.message}</div>`;
    promptDisplay.textContent = '';
    btn.disabled = false;
    btn.textContent = '✦ CONVERT TO REAL IMAGE';
  }
}
</script>
